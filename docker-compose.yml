version: '3.8'

services:
  db:
    image: postgres:16
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=app
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d app']
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=local
      - PORT=3000
      - SERVER_URL=http://localhost:3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=app
      - DB_PASSWORD=app
      - DB_DATABASE=app
      - DB_LOGGING=false
      - DB_MIGRATIONS_RUN=false
      - JWT_SECRET=local-development-secret
      - JWT_EXPIRES_IN=1d
      - SWAGGER_AUTH_ID=admin
      - SWAGGER_AUTH_PW=admin
      - SWAGGER_PATH=/docs
      - SENTRY_DSN=
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
